<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitPulse // GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="logo-wrapper">
                <i class="fa-brands fa-github logo-icon"></i>
                <h1>GitPulse</h1>
            </div>
            <p class="subtitle">Instant telemetry diagnostics for GitHub developer accounts</p>
        </header>

        <div class="search-panel">
            <div class="input-relative">
                <i class="fa-solid fa-magnifying-glass search-inline-icon"></i>
                <input 
                    type="text" 
                    id="usernameInput" 
                    placeholder="Enter GitHub handle (e.g., torvalds)..."
                    spellcheck="false"
                    autocomplete="off"
                >
                <div id="inlineLoader" class="inline-spinner"></div>
            </div>
            <button id="searchBtn">Pulse Search</button>
        </div>

        <div id="interactiveLoader" class="interactive-loader-box">
            <div class="terminal-header">
                <span class="terminal-dot red"></span>
                <span class="terminal-dot yellow"></span>
                <span class="terminal-dot green"></span>
                <span class="terminal-title">system_status.log</span>
            </div>
            <div class="terminal-body">
                <p id="loaderMessage" class="terminal-text">📡 Initializing GitPulse core...</p>
                <span class="terminal-cursor">_</span>
            </div>
        </div>

        <div id="errorPanel" class="error-card" style="display: none;">
            <i class="fa-solid fa-triangle-exclamation error-icon"></i>
            <div>
                <h3>Account Query Failed</h3>
                <p id="errorText">The specified developer handle could not be resolved.</p>
            </div>
        </div>

        <div id="realDataContainer" class="profile-card data-hidden"></div>

    </div>

    <script src="main.js"></script>
</body>
</html>
