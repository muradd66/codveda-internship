<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Next-Gen Concept Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <nav class="navbar">
            <div class="logo-area">
                <div class="logo-accent"></div>
                <h1 class="logo-text">Aura</h1>
            </div>
            
            <div class="header-actions">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search masterpieces..." aria-label="Search products">
                </div>

                <button id="cart-trigger" class="icon-action-btn" aria-label="Open Shopping Cart">
                    <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <span class="badge-count cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <div class="store-layout">
        
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">Categories</h3>
                <div id="category-list" class="category-list">
                </div>
            </div>
        </aside>

        <main class="store-container">
            <header class="hero-section">
                <span class="promo-badge">Curated Collection 2026</span>
                <h2 class="hero-title">Elevate Your Everyday <br>Aesthetics</h2>
            </header>

            <div class="filter-toolbar">
                <div class="tab-group">
                    <button id="tab-all" class="tab-btn active" aria-label="Show all products">
                        <span>All Masterpieces</span>
                    </button>
                    <button id="tab-favs" class="tab-btn" aria-label="Show favorite products">
                        <svg class="heart-svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <span>Favorites</span>
                        <span id="fav-counter" class="inline-counter">0</span>
                    </button>
                </div>

                <div class="sort-group">
                    <select id="sort-select" class="sort-select" aria-label="Sort products">
                        <option value="default">Sort by: Featured</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                        <option value="name-asc">Name: A to Z</option>
                    </select>
                </div>
            </div>

            <div id="product-grid" class="product-grid">
                <div class="loader-spinner"></div>
            </div>
        </main>
    </div>

    <aside id="cart-drawer" class="cart-drawer" aria-hidden="true">
        <div class="cart-drawer-header">
            <h3>Shopping Bag</h3>
            <button id="cart-close" class="close-btn" aria-label="Close Cart">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div id="cart-items" class="cart-items-container"></div>

        <div class="cart-drawer-footer">
            <div class="total-price-row">
                <span>Subtotal</span>
                <span id="total-price">$0.00</span>
            </div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </aside>

    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
